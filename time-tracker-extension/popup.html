<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Tracker - Popup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- MAIN POINT: Header showing current tracking status -->
    <div class="popup-container">
      <h1 class="title">⏱️ Time Tracker</h1>

      <!-- MAIN POINT: Show current website being tracked -->
      <div class="current-tab-section">
        <h3>Current Website</h3>
        <div class="current-website" id="currentWebsite">
          <p>Loading...</p>
        </div>
        <div class="current-time" id="currentTime">
          <p>0s</p>
        </div>
      </div>

      <!-- MAIN POINT: Quick stats showing today's productivity overview -->
      <div class="stats-section">
        <h3>Today's Stats</h3>
        <div class="stats-grid">
          <div class="stat-card productive">
            <span class="stat-label">Productive</span>
            <span class="stat-value" id="productiveTime">0h 0m</span>
          </div>
          <div class="stat-card unproductive">
            <span class="stat-label">Unproductive</span>
            <span class="stat-value" id="unproductiveTime">0h 0m</span>
          </div>
          <div class="stat-card neutral">
            <span class="stat-label">Neutral</span>
            <span class="stat-value" id="neutralTime">0h 0m</span>
          </div>
        </div>
      </div>

      <!-- MAIN POINT: Productivity score calculated from today's activities -->
      <div class="productivity-score">
        <h3>Productivity Score</h3>
        <div class="score-container">
          <div class="score-circle" id="scoreCircle">
            <span class="score-value" id="scoreValue">0</span>%
          </div>
        </div>
      </div>

      <!-- MAIN POINT: Quick actions to view detailed dashboard or clear data -->
      <div class="action-buttons">
        <button id="dashboardBtn" class="btn btn-primary">
          📊 View Dashboard
        </button>
        <button id="reportBtn" class="btn btn-secondary">
          📋 Weekly Report
        </button>
        <button id="resetBtn" class="btn btn-tertiary">🔄 Clear Data</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
